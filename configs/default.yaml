# Default configuration for Sorani Kurdish GEC
# ============================================

project:
  name: "sorani-gec"
  description: "Agreement-Aware GEC for Sorani Kurdish"

data:
  raw_dir: "data/raw"
  clean_dir: "data/clean"
  synthetic_dir: "data/synthetic"
  splits_dir: "data/splits"
  
  # Corpus settings
  target_pairs: 50000
  train_ratio: 0.8
  dev_ratio: 0.1
  test_ratio: 0.1
  max_seq_length: 256
  
  # Normalization
  normalize_arabic_script: true
  remove_diacritics: false
  
  # Error generation
  error_types:
    - "subject_verb_number"
    - "noun_adjective_ezafe"
    - "clitic_form"
    - "tense_agreement"
    - "case_role_preposition"
    - "dialectal_participle"
    - "relative_clause_ezafe"
    - "missing_adversative_connector"
    - "participle_voice_swap"
    - "orthography"
    - "negative_concord"
    - "vocative_imperative"
    - "conditional_agreement"
    - "adverb_verb_tense"
    - "preposition_fusion"
    - "demonstrative_contraction"
    - "quantifier_agreement"
    - "possessive_clitic"
    - "polite_imperative"
    - "spelling_confusion"
    - "word_order"
    - "whitespace_error"
    - "punctuation_error"
    - "cross_clause_agreement"
    - "morpheme_order"
  error_rate: 0.15  # probability of injecting error per eligible position

model:
  # Pretrained backbone — all architecture params come from the checkpoint
  pretrained: "google/byt5-small"  # byte-level, no tokenization issues
  # pretrained: "google/mt5-small"  # alternative
  
  # Supported ByT5 size variants (selectable via --model flag in training scripts)
  # Each variant uses the same architecture; only backbone size differs.
  supported_variants:
    - "google/byt5-small"    # ~300M params — default, fits 8GB VRAM
    - "google/byt5-base"     # ~582M params — needs 16GB+ VRAM
    - "google/mt5-small"     # ~300M params — subword tokenization alternative
  
  # Morphological features
  use_morphology: true
  morph_features:
    - "person"         # 1st, 2nd, 3rd
    - "number"         # singular, plural
    - "tense"          # present, past, future
    - "aspect"         # perfective, imperfective, progressive
    - "case"           # nominative, oblique, ezafe
    - "definiteness"   # definite, indefinite
    - "transitivity"   # transitive, intransitive
    - "clitic_person"  # 1, 2, 3
    - "clitic_number"  # singular, plural
  morph_embed_dim: 64

training:
  batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  max_epochs: 30
  early_stopping_patience: 5
  gradient_accumulation_steps: 8
  fp16: true
  
  # Loss
  agreement_loss_weight: 0.3  # auxiliary agreement prediction loss
  agreement_warmup_epochs: 5  # epochs before full agreement loss contribution
  gradient_clip_norm: 1.0
  cosine_restarts: 3  # number of cosine annealing restarts
  curriculum_edge_weight: 0.5  # morphology difficulty edge weight
  
  # Optimizer
  optimizer: "adamw"
  scheduler: "cosine_with_restarts"
  
  # Checkpointing
  save_dir: "results/models"
  save_top_k: 3
  
  # Logging
  log_every_n_steps: 50
  eval_every_n_steps: 500

evaluation:
  metrics:
    - "f05"           # F₀.₅ (standard GEC)
    - "precision"
    - "recall"
    - "agreement_accuracy"  # Sorani-specific
  beam_width: 4
  eval_pairs_file: "evaluation_pairs.jsonl"
  bootstrap_resamples: 1000  # confidence interval resamples

  human_eval:
    n_sentences: 200
    n_raters: 2
  
  ablation:
    - "no_morphology"           # baseline without morph features
    - "individual_features"     # one feature at a time
    - "data_size_variation"     # 10K, 20K, 30K, 40K, 50K
    - "agreement_loss_weight"   # λ = 0.0, 0.1, 0.3, 0.5, 1.0 (PIPE-6)

hardware:
  device: "cuda"
  gpu: "rtx3090"
  num_workers: 4
  pin_memory: true
